#cloud-config

package_update: false
package_upgrade: false
packages:
  - curl
  - unzip
  - docker.io

runcmd:
  # Configure Docker to authenticate to Artifact Registry using the instance's
  # service account via Application Default Credentials (GCE metadata server).
  - gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

cloud_final_modules:
  - [package_update_upgrade_install, always]
  - [runcmd, once-per-instance]
